<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WallRank | Interactive Wallpapers</title>
<link rel="stylesheet" href="CSS/main.css">
<style>
body {margin:0; font-family: Arial, sans-serif; background: #f5f5f5; color: #333;}
header {position: sticky; top:0; background: #fff; display:flex; justify-content: space-between; align-items:center; padding: 15px 30px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
header .logo {font-weight:bold; font-size:20px;}
nav a {margin:0 8px; text-decoration:none; color:#555; font-weight:500;}
nav a:hover {color:#e94e77;}
.main {max-width:1200px; margin:40px auto; text-align:center;}
.mockup-container {position:relative; height:520px; margin-bottom:20px; overflow:hidden; background: #ddd; border-radius:20px; display:flex; justify-content:center; align-items:center;}
.mockup-container img {max-width:100%; max-height:100%; border-radius:20px; transition: transform 0.5s ease;}
.controls {display:flex; justify-content:center; gap:15px; margin-top:20px;}
button {padding:10px 15px; border:none; border-radius:8px; background:#e94e77; color:#fff; font-weight:bold; cursor:pointer; transition:0.2s;}
button:hover {opacity:0.85;}
footer {margin-top:50px; text-align:center; padding:15px; font-size:13px; color:#666;}
footer a {color:#e94e77; margin:0 5px; text-decoration:none;}
</style>
</head>
<body>

<header>
  <div class="logo">WallRank</div>
  <nav>
    <a href="pages/lofi.html">Lofi</a>
    <a href="pages/cyberpunk.html">Cyberpunk</a>
    <a href="pages/nature.html">Nature</a>
    <a href="pages/abstract.html">Abstract</a>
    <a href="pages/minimal.html">Minimal</a>
  </nav>
</header>

<div class="main">
  <h1>Interactive Mockup Gallery</h1>

  <div class="mockup-container" id="mockup">
    <img id="wallpaper" src="https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg">
  </div>

  <div class="controls">
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>
    <button onclick="startPuzzle()">🧩 Puzzle</button>
  </div>
</div>

<footer>
  <p>© 2026 WallRank</p>
  <p>
    <a href="privacy-policy.html">Privacy</a> |
    <a href="terms.html">Terms</a> |
    <a href="about-us.html">About</a> |
    <a href="contact-us.html">Contact</a>
  </p>
</footer>

<script>
// Wallpapers array
const wallpapers = [
"https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg",
"https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg"
];

let index = 0;

function updateWallpaper() {
  const img = document.getElementById("wallpaper");
  img.style.transform = "translateX(100%)";
  setTimeout(() => {
    img.src = wallpapers[index];
    img.style.transform = "translateX(0)";
  }, 200);
}

function next() {
  index = (index + 1) % wallpapers.length;
  updateWallpaper();
}

function prev() {
  index = (index - 1 + wallpapers.length) % wallpapers.length;
  updateWallpaper();
}

// PUZZLE
function startPuzzle() {
  const container = document.getElementById("mockup");
  container.innerHTML = "";
  const img = new Image();
  img.src = wallpapers[index];
  img.style.width = "100%";
  img.style.height = "100%";
  img.style.display = "none"; // hide full image
  container.appendChild(img);

  const rows = 3;
  const cols = 3;
  let pieces = [];

  for (let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const piece = document.createElement("div");
      piece.style.width = (100/cols)+"%";
      piece.style.height = (100/rows)+"%";
      piece.style.backgroundImage = `url(${img.src})`;
      piece.style.backgroundSize = `${cols*100}% ${rows*100}%`;
      piece.style.backgroundPosition = `${-c*100}% ${-r*100}%`;
      piece.style.float="left";
      piece.style.border="1px solid #fff";
      piece.style.boxSizing="border-box";
      piece.onclick = function(){this.remove(); checkWin()};
      container.appendChild(piece);
      pieces.push(piece);
    }
  }

  function checkWin(){
    if(pieces.every(p => !p.parentNode)){
      alert("🎉 Congratulations! Puzzle completed!");
      container.innerHTML="";
      container.appendChild(img);
      img.style.display="block";
    }
  }
}
</script>

</body>
</html>
