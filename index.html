<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WallRank | Preview & Download Wallpapers</title>

<link rel="stylesheet" href="CSS/main.css">

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

/* NAVBAR */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.logo {
  font-size:20px;
  font-weight:bold;
}

nav a {
  margin:0 10px;
  text-decoration:none;
  color:#ccc;
  padding:6px 12px;
  border-radius:6px;
  transition:0.2s;
}

nav a:hover {
  background:#22c55e;
  color:black;
}

/* CENTER */
.main {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  height:80vh;
}

/* DEVICE CONTAINER */
.device-container {
  perspective:1200px;
}

/* DEVICE BASE */
.device {
  width:260px;
  height:520px;
  border-radius:30px;
  overflow:hidden;
  background:black;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  transition:all 0.6s ease;
  transform-style:preserve-3d;
}

/* DESKTOP */
.device.desktop {
  width:600px;
  height:350px;
  border-radius:14px;
}

/* PROFILE */
.device.profile {
  width:220px;
  height:220px;
  border-radius:50%;
}

/* IMAGE */
.device img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CONTROLS */
.controls {
  margin-top:25px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#22c55e;
  color:black;
  font-weight:bold;
  transition:0.2s;
}

button:hover {
  opacity:0.8;
}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#020617;
  font-size:13px;
  color:#aaa;
}

footer a {
  color:#22c55e;
  text-decoration:none;
  margin:0 8px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">WallRank</div>

  <nav>
    <a href="pages/lofi.html">Lofi</a>
    <a href="pages/cyberpunk.html">Cyberpunk</a>
    <a href="pages/nature.html">Nature</a>
    <a href="pages/abstract.html">Abstract</a>
    <a href="pages/minimal.html">Minimal</a>
  </nav>
</header>

<!-- MAIN -->
<div class="main">

  <div class="device-container">
    <div id="device" class="device">
      <img id="wallpaper" src="https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg">
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button onclick="prev()">⬅ Prev</button>
    <button onclick="next()">Next ➡</button>
    <button onclick="setDevice('mobile')">📱 Mobile</button>
    <button onclick="setDevice('desktop')">💻 Desktop</button>
    <button onclick="setDevice('profile')">👤 Profile</button>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 WallRank</p>
  <p>
    <a href="privacy-policy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="about-us.html">About</a>
    <a href="contact-us.html">Contact</a>
  </p>
</footer>

<script>
const wallpapers = [
"https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg",
"https://res.cloudinary.com/dnfzr2kno/image/upload/v1775734597/lucid-origin_lofi_bedroom_with_glowing_computer_screen_plants_vinyl_records_warm_lighting_rai-0_owf33n.jpg"
];

let index = 0;

function show() {
  document.getElementById("wallpaper").src = wallpapers[index];
}

function next() {
  index = (index + 1) % wallpapers.length;
  animate();
}

function prev() {
  index = (index - 1 + wallpapers.length) % wallpapers.length;
  animate();
}

function animate() {
  const device = document.getElementById("device");
  device.style.transform = "rotateY(90deg)";
  setTimeout(() => {
    show();
    device.style.transform = "rotateY(0deg)";
  }, 200);
}

function setDevice(type) {
  const d = document.getElementById("device");

  d.classList.remove("mobile","desktop","profile");

  if(type === "desktop") d.classList.add("desktop");
  if(type === "profile") d.classList.add("profile");
}
</script>

</body>
</html>
